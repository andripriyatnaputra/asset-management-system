# File: docker-compose.yml
#version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=asset_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    # --- TAMBAHKAN BLOK INI UNTUK HEALTHCHECK ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d asset_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # ------------------------------------------
  
  app:
    build: .
    env_file:
      - .env
    ports:
      - '8080:8080'
    # --- UBAH BAGIAN depends_on INI ---
    depends_on:
      db:
        condition: service_healthy # Tunggu sampai healthcheck db sukses
    # ----------------------------------

volumes:
  postgres_data: