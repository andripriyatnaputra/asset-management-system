name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Backend: Go tests ──────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres_test:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: asset_db_test
          POSTGRES_USER: admin_test
          POSTGRES_PASSWORD: secret_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Apply database schema
        env:
          PGPASSWORD: secret_test
        run: |
          psql -h localhost -p 5433 -U admin_test -d asset_db_test \
            -f database/init/init.sql

      - name: Run backend tests
        env:
          DATABASE_URL: postgres://admin_test:secret_test@localhost:5433/asset_db_test?sslmode=disable
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          LDAP_ENCRYPTION_KEY: ${{ secrets.LDAP_ENCRYPTION_KEY }}
        run: go test -v -timeout 120s ./...

  # ── Frontend: Vitest ───────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── Docker build & push (hanya di push ke main, bukan PR) ─────────────────
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ backend-test, frontend-test ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/it-ams:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
