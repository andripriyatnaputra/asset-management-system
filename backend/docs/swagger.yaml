info:
  contact: {}
  description: Backend API implementing ISO/IEC 19770-10 Grade A++ RBAC model
  title: IT Asset & Compliance API
  version: "1.1"
paths:
  /approvals:
    get:
      parameters:
      - description: service_request atau change_request
        in: query
        name: entity_type
        required: true
        type: string
      - description: ID entitas
        in: query
        name: entity_id
        required: true
        type: integer
      responses: {}
      summary: List approval history untuk suatu entitas
      tags:
      - Approval
    post:
      responses: {}
      summary: Tambah approver ke workflow (service_request / change_request)
      tags:
      - Approval
  /approvals/decision:
    post:
      responses: {}
      summary: Submit keputusan approval (approved/rejected/skipped)
      tags:
      - Approval
  /assets/{id}/disposal:
    get:
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      summary: Ambil record disposal suatu aset
      tags:
      - Asset Disposal
    post:
      consumes:
      - application/json
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      summary: Buat disposal record untuk aset yang akan/sudah dibuang
      tags:
      - Asset Disposal
    put:
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Update disposal record (sertifikat, environmental compliance, dll)
      tags:
      - Asset Disposal
  /assets/{id}/spec:
    get:
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AssetSpecification'
      summary: Ambil spesifikasi hardware suatu aset
      tags:
      - Asset Specifications
    put:
      consumes:
      - application/json
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      summary: Buat atau update spesifikasi hardware aset (upsert)
      tags:
      - Asset Specifications
  /assets/compliance-export:
    get:
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Export compliance report as CSV
      tags:
      - Compliance
  /assets/compliance-summary:
    get:
      description: Retrieve compliance status of all assets
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get all asset compliance records
      tags:
      - Compliance
  /assets/disposals:
    get:
      parameters:
      - description: Filter yang sudah environmental compliant
        in: query
        name: env_compliant
        type: boolean
      produces:
      - application/json
      responses: {}
      summary: List semua disposal records
      tags:
      - Asset Disposal
  /change-requests:
    get:
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type (standard/normal/emergency)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ChangeRequestInfo'
            type: array
      summary: List semua change requests
      tags:
      - Change Management
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      summary: Buat change request baru
      tags:
      - Change Management
  /change-requests/{id}:
    delete:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Soft-delete change request
      tags:
      - Change Management
    get:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ChangeRequestDetail'
      summary: Detail change request beserta approvals & tasks
      tags:
      - Change Management
    put:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Update detail change request
      tags:
      - Change Management
  /change-requests/{id}/approve:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Approve CR → status approved + catat approver
      tags:
      - Change Management
  /change-requests/{id}/approvers:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Tambah anggota CAB untuk mereview CR
      tags:
      - Change Management
  /change-requests/{id}/approvers/decision:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Submit keputusan CAB (approved/rejected/abstain)
      tags:
      - Change Management
  /change-requests/{id}/close:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Tutup CR → status closed
      tags:
      - Change Management
  /change-requests/{id}/complete:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Tandai CR selesai diimplementasi → status implemented
      tags:
      - Change Management
  /change-requests/{id}/implement:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Tandai CR sedang diimplementasi → status implementing
      tags:
      - Change Management
  /change-requests/{id}/reject:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Tolak CR → status rejected
      tags:
      - Change Management
  /change-requests/{id}/schedule:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Set jadwal implementasi → status scheduled
      tags:
      - Change Management
  /change-requests/{id}/submit:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Submit CR dari draft → under_review / approved (standard)
      tags:
      - Change Management
  /change-requests/{id}/tasks:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Tambah sub-task implementasi ke CR
      tags:
      - Change Management
  /change-requests/{id}/tasks/{task_id}:
    delete:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      responses: {}
      summary: Hapus task dari CR
      tags:
      - Change Management
    put:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      responses: {}
      summary: Update status / detail task
      tags:
      - Change Management
  /change-requests/{id}/verify:
    post:
      parameters:
      - description: Change Request ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Verifikasi hasil CR → status verified
      tags:
      - Change Management
  /dr/plans:
    get:
      parameters:
      - description: Filter by plan type (DR|BCP|COOP)
        in: query
        name: type
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Search by name
        in: query
        name: q
        type: string
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.pagedResponse'
      security:
      - BearerAuth: []
      summary: List semua DR/BCP plans
      tags:
      - DR/BCP
    post:
      consumes:
      - application/json
      parameters:
      - description: DR Plan
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.DRPlan'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.DRPlan'
      security:
      - BearerAuth: []
      summary: Buat DR/BCP plan baru
      tags:
      - DR/BCP
  /dr/plans/{id}:
    get:
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DRPlan'
      security:
      - BearerAuth: []
      summary: Detail DR/BCP plan beserta langkah-langkah
      tags:
      - DR/BCP
  /dr/tests:
    get:
      parameters:
      - description: Filter by plan ID
        in: query
        name: plan_id
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.pagedResponse'
      security:
      - BearerAuth: []
      summary: List DR test records
      tags:
      - DR/BCP
  /escalation-rules:
    get:
      produces:
      - application/json
      responses: {}
      summary: List semua aturan eskalasi
      tags:
      - Escalation
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      summary: Buat aturan eskalasi baru
      tags:
      - Escalation
  /escalation-rules/{id}:
    delete:
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Hapus aturan eskalasi
      tags:
      - Escalation
    put:
      parameters:
      - description: Rule ID
        in: path
        name: id
        required: true
        type: integer
      responses: {}
      summary: Update aturan eskalasi
      tags:
      - Escalation
  /export/assets.xlsx:
    get:
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: Export daftar asset ke Excel
      tags:
      - Export
  /export/audit-logs.xlsx:
    get:
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: Export audit log ke Excel (maks 5000 baris terbaru)
      tags:
      - Export
  /export/licenses.xlsx:
    get:
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: Export daftar lisensi ke Excel
      tags:
      - Export
  /governance/score-summary:
    get:
      description: Returns average governance score and compliance rate per department
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get governance score summary
